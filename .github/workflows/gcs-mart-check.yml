name: GCS Mart Check

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "dags/**"
      - "src/**"
      - "scripts/**"
      - "requirements*.txt"

permissions:
  contents: read

jobs:
  check-gcs-mart:
    name: Check GCS mart path
    runs-on: ubuntu-latest

    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
      GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
      GCS_MART_PREFIX: mart/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: |
          printf '%s' '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Check required secrets
        run: |
          test -n "$GCS_BUCKET"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-storage

      - name: Check mart parquet files
        run: |
          python - <<'PY'
          import os
          import sys
          from google.cloud import storage

          bucket_name = os.environ["GCS_BUCKET"]
          prefix = os.environ.get("GCS_MART_PREFIX", "mart/")

          client = storage.Client()
          blobs = list(client.list_blobs(bucket_name, prefix=prefix, max_results=50))
          parquet_files = [blob.name for blob in blobs if blob.name.endswith(".parquet")]

          if not parquet_files:
              print(f"No parquet files found in gs://{bucket_name}/{prefix}")
              sys.exit(1)

          print(f"Found {len(parquet_files)} parquet file(s).")
          for name in parquet_files[:10]:
              print(name)
          PY
